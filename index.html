<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Motion Lab</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="stage-panel" aria-labelledby="app-title">
        <header class="topbar">
          <h1 class="brand" id="app-title">motion.lab</h1>
          <div class="top-actions">
            <button class="icon-button" id="play" type="button" aria-label="Play animation" title="Play">
              <i data-lucide="play"></i>
            </button>
            <button class="icon-button" id="loop" type="button" aria-label="Loop animation" aria-pressed="false" title="Loop">
              <i data-lucide="repeat-2"></i>
            </button>
          </div>
        </header>

        <div class="demo-stage" id="demo-stage" aria-live="polite">
          <div class="stage-caption">
            <p class="category-label" id="active-category">Entrances & Exits</p>
            <h2 id="concept-title">Fade in / Fade out</h2>
            <p class="sr-only" id="concept-definition">Element appears or disappears by changing opacity.</p>
          </div>
          <div class="scroll-world" id="scroll-world">
            <div class="parallax back"></div>
            <div class="parallax mid"></div>
            <div class="demo-object" id="demo-object">
              <img class="lab-mark" src="assets/lab-mark.png" alt="" aria-hidden="true">
              <span id="demo-label">Fade</span>
            </div>
          </div>
          <div class="tap-target" id="tap-target" role="button" tabindex="0" aria-label="Interactive demo target">
            <span></span>
          </div>
        </div>
      </section>

      <aside class="bottom-sheet" id="bottom-sheet" aria-label="Animation learning panel">
        <button class="sheet-header" id="sheet-toggle" type="button" aria-expanded="false" aria-controls="sheet-body">
          <span class="grabber"></span>
          <span>
            <strong>Library</strong>
            <small id="sheet-summary">Fade in / Fade out</small>
          </span>
          <i data-lucide="chevron-up"></i>
        </button>

        <div class="sheet-body" id="sheet-body">
          <div class="sheet-tabs" role="tablist" aria-label="Panel view">
            <button class="sheet-tab is-active" id="library-tab" data-panel="library" type="button" role="tab" aria-selected="true" aria-controls="library-panel">Library</button>
            <button class="sheet-tab" id="controls-tab" data-panel="controls" type="button" role="tab" aria-selected="false" aria-controls="controls-panel">Controls</button>
          </div>

          <section class="sheet-view is-active" id="library-panel" role="tabpanel" aria-labelledby="library-tab">
            <div class="search-row">
              <label class="search-box">
                <i data-lucide="search"></i>
                <input id="search" type="search" placeholder="Search vocabulary">
              </label>
            </div>
            <nav class="category-tabs" id="category-tabs" aria-label="Vocabulary categories"></nav>
            <div class="term-list" id="term-list"></div>
          </section>

          <section class="sheet-view" id="controls-panel" role="tabpanel" aria-labelledby="controls-tab" hidden>
            <div class="control-header">
              <h2>Controls</h2>
              <label class="switch">
                <input id="reduced-motion" type="checkbox">
                <span>Reduced</span>
              </label>
            </div>

            <div class="control-grid">
              <label class="control">
                <span>Duration <strong id="duration-value">720ms</strong></span>
                <input id="duration" type="range" min="120" max="1800" step="20" value="720">
              </label>
              <label class="control">
                <span>Delay <strong id="delay-value">80ms</strong></span>
                <input id="delay" type="range" min="0" max="900" step="20" value="80">
              </label>
              <label class="control">
                <span>Stagger <strong id="stagger-value">80ms</strong></span>
                <input id="stagger" type="range" min="0" max="220" step="10" value="80">
              </label>
              <label class="control">
                <span>Perspective <strong id="perspective-value">720px</strong></span>
                <input id="perspective" type="range" min="260" max="1400" step="20" value="720">
              </label>
            </div>

            <div class="segmented" role="group" aria-label="Easing">
              <button class="segment is-active" data-ease="cubic-bezier(.2,.8,.2,1)" type="button">Ease-out</button>
              <button class="segment" data-ease="cubic-bezier(.65,0,.35,1)" type="button">Ease-in-out</button>
              <button class="segment" data-ease="linear" type="button">Linear</button>
              <button class="segment" data-ease="cubic-bezier(.34,1.56,.64,1)" type="button">Springy</button>
            </div>
          </section>
        </div>
      </aside>
    </main>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
