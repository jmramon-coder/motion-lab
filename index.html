<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Motion Lab</title>
    <meta name="description" content="Interactive animation vocabulary for designers, developers, and AI prompting.">
    <meta property="og:title" content="Motion Lab">
    <meta property="og:description" content="Pick an animation term, see it move, tune it, and copy a practical motion prompt.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="theme-color" content="#eef3f7">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="stage-panel" aria-labelledby="app-title">
        <h1 class="sr-only" id="app-title">motion.lab</h1>

        <div class="demo-stage" id="demo-stage" aria-live="polite">
          <div class="stage-caption">
            <div class="caption-copy">
              <p class="category-label" id="active-category">Entrances & Exits</p>
              <h2 id="concept-title">Fade in / Fade out</h2>
            </div>
            <div class="top-actions">
              <button class="icon-button" id="play" type="button" aria-label="Play animation" title="Play">
                <i data-lucide="play"></i>
              </button>
              <button class="icon-button" id="loop" type="button" aria-label="Loop animation" aria-pressed="false" title="Loop">
                <i data-lucide="repeat-2"></i>
              </button>
              <button class="icon-button" id="subject-toggle" type="button" aria-label="Open subject gallery" aria-expanded="false" aria-controls="subject-gallery" title="Subjects">
                <i data-lucide="images"></i>
              </button>
            </div>
            <p class="sr-only" id="concept-definition">Element appears or disappears by changing opacity.</p>
          </div>
          <div class="subject-gallery" id="subject-gallery" hidden>
            <button class="subject-option is-active" type="button" data-subject="logo">
              <img src="assets/lab-mark.png" alt="">
              <span>Logo <small>UI</small></span>
            </button>
            <button class="subject-option" type="button" data-subject="character">
              <img src="assets/subject-character.png" alt="">
              <span>Statue <small>reveal</small></span>
            </button>
            <button class="subject-option" type="button" data-subject="ball">
              <img src="assets/subject-ball.png" alt="">
              <span>Ball <small>spring</small></span>
            </button>
            <button class="subject-option" type="button" data-subject="plane">
              <img src="assets/subject-plane.png" alt="">
              <span>Plane <small>path</small></span>
            </button>
            <button class="subject-option" type="button" data-subject="blob">
              <img src="assets/subject-blob.png" alt="">
              <span>Blob <small>morph</small></span>
            </button>
          </div>
          <div class="subject-size-control" aria-label="Subject size" role="group">
            <label class="size-slider">
              <span class="sr-only">Subject size</span>
              <input id="subject-size" type="range" min="30" max="90" step="1" value="68">
              <span class="size-rail" aria-hidden="true">
                <span class="size-fill"></span>
                <span class="size-thumb"></span>
              </span>
            </label>
          </div>
          <div class="scroll-world" id="scroll-world">
            <div class="parallax back"></div>
            <div class="parallax mid"></div>
            <div class="demo-object" id="demo-object">
              <img class="lab-mark" id="subject-image" src="assets/lab-mark.png" alt="" aria-hidden="true">
              <span class="demo-label" id="demo-label" aria-hidden="true">Fade</span>
            </div>
          </div>
        </div>
      </section>

      <aside class="bottom-sheet" id="bottom-sheet" aria-label="Animation learning panel">
        <div class="sheet-body" id="sheet-body">
          <div class="panel-switch" role="tablist" aria-label="Panel view">
            <button class="panel-switch-button is-active" id="library-tab" data-panel="library" type="button" role="tab" aria-selected="true" aria-controls="library-panel">
              <i data-lucide="book-open"></i>
              <span>Library</span>
            </button>
            <button class="panel-switch-button" id="controls-tab" data-panel="controls" type="button" role="tab" aria-selected="false" aria-controls="controls-panel">
              <i data-lucide="sliders-horizontal"></i>
              <span>Controls</span>
            </button>
          </div>

          <div class="use-strip" aria-live="polite">
            <div class="use-copy">
              <strong id="use-title">Spring</strong>
              <span id="use-summary">Motion driven by physics instead of a fixed duration.</span>
            </div>
            <div class="use-actions">
              <button class="mini-action" id="copy-prompt" type="button">Prompt</button>
              <button class="mini-action" id="copy-link" type="button">Link</button>
              <button class="mini-action" id="copy-x" type="button">X</button>
            </div>
            <p class="copy-feedback" id="copy-feedback" aria-live="polite"></p>
          </div>

          <section class="panel-view is-active" id="library-panel" role="tabpanel" aria-labelledby="library-tab">
            <div class="section-list" id="section-list" aria-label="Animation library"></div>
          </section>

          <section class="panel-view" id="controls-panel" role="tabpanel" aria-labelledby="controls-tab" hidden>
            <div class="section-content controls-content">
              <div class="control-header">
                <h2>Controls</h2>
                <label class="switch">
                  <input id="reduced-motion" type="checkbox">
                  <span>Reduced</span>
                </label>
              </div>

              <div class="control-grid">
                <label class="control">
                  <span>Duration <strong id="duration-value">720ms</strong></span>
                  <input id="duration" type="range" min="120" max="1800" step="20" value="720">
                </label>
                <label class="control">
                  <span>Delay <strong id="delay-value">80ms</strong></span>
                  <input id="delay" type="range" min="0" max="900" step="20" value="80">
                </label>
                <label class="control">
                  <span>Stagger <strong id="stagger-value">80ms</strong></span>
                  <input id="stagger" type="range" min="0" max="220" step="10" value="80">
                </label>
                <label class="control">
                  <span>Perspective <strong id="perspective-value">720px</strong></span>
                  <input id="perspective" type="range" min="260" max="1400" step="20" value="720">
                </label>
              </div>

              <div class="context-controls" id="context-controls" aria-live="polite"></div>

              <div class="segmented" role="group" aria-label="Easing">
                <button class="segment is-active" data-ease="cubic-bezier(.2,.8,.2,1)" type="button">Ease-out</button>
                <button class="segment" data-ease="cubic-bezier(.65,0,.35,1)" type="button">Ease-in-out</button>
                <button class="segment" data-ease="linear" type="button">Linear</button>
                <button class="segment" data-ease="cubic-bezier(.34,1.56,.64,1)" type="button">Springy</button>
              </div>
            </div>
          </section>
        </div>
      </aside>
    </main>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
